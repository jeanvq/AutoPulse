<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoPulse — Login</title>
    <meta name="theme-color" content="#0b0f1a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body class="auth-body">

    <div class="auth-container">

      <!-- Logo -->
      <div class="auth-brand">
        <img src="LOGOFINAL.png" alt="AutoPulse" class="auth-logo" />
        <h1 class="auth-title">AutoPulse</h1>
        <p class="auth-subtitle">Smart vehicle platform</p>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- Login Form -->
      <div id="form-login" class="auth-form">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@email.com" required />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="login-password" placeholder="••••••••" required />
            <button type="button" class="toggle-password" onclick="togglePassword('login-password', this)" aria-label="Show password">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>
        <div id="login-error" class="auth-message error" style="display:none;"></div>
        <button class="btn primary auth-btn" onclick="handleLogin()">Sign In</button>
        <p style="text-align:center;margin-top:12px;font-size:0.88rem;">
         <a href="javascript:void(0)" onclick="switchTab('forgot')"
             style="color:var(--accent);text-decoration:none;font-weight:500;">
            Forgot password?
          </a>
        </p>
      </div>

      <!-- Forgot Password Form -->
      <div id="form-forgot" class="auth-form" style="display:none;">
        <p style="color:var(--muted);font-size:0.9rem;margin-bottom:16px;">
          Enter your email and choose a new password.
        </p>
        <div class="form-group">
          <label for="forgot-email">Email</label>
          <input type="email" id="forgot-email" placeholder="you@email.com" required />
        </div>
        <div class="form-group">
          <label for="forgot-password">New Password</label>
          <input type="password" id="forgot-password" placeholder="Min. 6 characters" required />
        </div>
        <div id="forgot-error" class="auth-message error" style="display:none;"></div>
        <div id="forgot-success" class="auth-message success" style="display:none;"></div>
        <button class="btn primary auth-btn" onclick="handleForgotPassword()">Reset Password</button>
        <p style="text-align:center;margin-top:12px;font-size:0.88rem;">
          <a href="#" onclick="switchTab('login')" 
             style="color:var(--accent);text-decoration:none;font-weight:500;">
            ← Back to Sign In
          </a>
        </p>
      </div>

      <!-- Signup Form -->
      <div id="form-signup" class="auth-form" style="display:none;">
        <div class="form-group">
          <label for="signup-name">Full Name</label>
          <input type="text" id="signup-name" placeholder="John Doe" required />
        </div>
        <div class="form-group">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" placeholder="you@email.com" required />
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="signup-password" placeholder="Min. 6 characters" required />
            <button type="button" class="toggle-password" onclick="togglePassword('signup-password', this)" aria-label="Show password">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>
        <div id="signup-error" class="auth-message error" style="display:none;"></div>
        <div id="signup-success" class="auth-message success" style="display:none;"></div>
        <button class="btn primary auth-btn" onclick="handleSignup()">Create Account</button>
      </div>

    </div>

    <script src="auth.js"></script>
  </body>
</html>
