<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoPulse — Login</title>
    <meta name="theme-color" content="#0b0f1a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body class="auth-body">

    <div class="auth-container">

      <!-- Logo -->
      <div class="auth-brand">
        <img src="LOGOFINAL.png" alt="AutoPulse" class="auth-logo" />
        <h1 class="auth-title">AutoPulse</h1>
        <p class="auth-subtitle">Smart vehicle platform</p>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- Login Form -->
      <div id="form-login" class="auth-form">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@email.com" required />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required />
        </div>
        <div id="login-error" class="auth-message error" style="display:none;"></div>
        <button class="btn primary auth-btn" onclick="handleLogin()">Sign In</button>
      </div>

      <!-- Signup Form -->
      <div id="form-signup" class="auth-form" style="display:none;">
        <div class="form-group">
          <label for="signup-name">Full Name</label>
          <input type="text" id="signup-name" placeholder="John Doe" required />
        </div>
        <div class="form-group">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" placeholder="you@email.com" required />
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" placeholder="Min. 6 characters" required />
        </div>
        <div id="signup-error" class="auth-message error" style="display:none;"></div>
        <div id="signup-success" class="auth-message success" style="display:none;"></div>
        <button class="btn primary auth-btn" onclick="handleSignup()">Create Account</button>
      </div>

    </div>

    <script src="auth.js"></script>
  </body>
</html>
